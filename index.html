<script>

function unlock() {
  let input = document.getElementById("password").value;

  db.collection("settings").doc("password").get().then((doc) => {

    // If password not created yet → create it
    if (!doc.exists) {
      db.collection("settings").doc("password").set({
        value: input
      }).then(() => {
        alert("Password created 💖");
        openApp();
      });
    } 
    else {
      // Check entered password
      if (input === doc.data().value) {
        openApp();
      } else {
        alert("Wrong password 💔");
      }
    }

  });
}

function openApp(){
document.getElementById("lockScreen").style.display = "none";
document.getElementById("app").style.display = "block";
document.getElementById("bgMusic").play();
showNotes();
showLoggedUser();
dailyReminder();
nightMessage();
anniversaryCelebration();
onThisDay();
}

function saveNote(){
let title = document.getElementById("noteTitle").value;
let text = document.getElementById("noteText").value;
let file = document.getElementById("imageUpload").files[0];

if(!text && !file) return;

if(file){
let reader = new FileReader();

reader.onload = function(e){
storeNote(title,text,e.target.result);
};

reader.readAsDataURL(file);

}else{
storeNote(title,text,"");
}
}

function storeNote(title,text,img){

let mood = document.getElementById("mood").value;
let place = document.getElementById("place").value;

db.collection("notes").add({
title,
text,
img,
voice: voiceBlob ? URL.createObjectURL(voiceBlob) : "",
mood,
place,
author: currentUser,
date:new Date().toISOString(),
likes:0
});

document.getElementById("noteTitle").value="";
document.getElementById("noteText").value="";
document.getElementById("imageUpload").value="";
}

function showNotes(){

db.collection("notes")
.orderBy("date","desc")
.onSnapshot(snapshot => {

let html = "";

snapshot.forEach(doc => {
let n = doc.data();

html += `
<div class="card note">
<b>${n.title || "Untitled"}</b>
<p>${n.text}</p>
<small>by ${n.author || "unknown"}</small>
${n.img ? `<img src="${n.img}" style="width:100%;border-radius:10px;">` : ""}
${n.voice ? `<audio controls src="${n.voice}" style="width:100%"></audio>` : ""}
${n.mood ? `<div>${n.mood}</div>` : ""}
${n.place ? `<small>📍 ${n.place}</small>` : ""}
<small>${new Date(n.date).toLocaleString()}</small>

<div>
<button class="like-btn" onclick="likeNote('${doc.id}')">
❤️ ${n.likes || 0}
</button>

<button class="edit-btn" onclick="editNote('${doc.id}', \`${n.title || ""}\`, \`${n.text}\`)">✏️ Edit</button>
<button class="pdf-btn" onclick="exportSinglePDF('${doc.id}')">📄 PDF</button>
<button class="delete-btn" onclick="deleteNote('${doc.id}')">🗑 Delete</button>
</div>

</div>
`;
});

document.getElementById("notes").innerHTML = html;

});
}

function deleteNote(id){

db.collection("notes").doc(id).get().then(doc => {

const note = doc.data();

if(note.author === currentUser || currentUser.toLowerCase() === "manoj"){

if(!confirm("Want to delete?")) return;

db.collection("trash").add(note).then(()=>{
db.collection("notes").doc(id).delete();
});

}else{
alert("Only " + note.author + " can delete this note 💖");
}

});

}

function openBin(){
  if(currentUser.toLowerCase() !== "manoj") return;

  document.getElementById("binModal").style.display = "flex";

  db.collection("trash")
  .orderBy("date","desc")
  .get()
  .then(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      const n = doc.data();
      html += `
      <div class="note">
        <b>${n.title}</b>
        <p style="white-space:pre-line">${n.text}</p>
        <small>by ${n.author}</small>
        <button onclick="restoreNote('${doc.id}')">Restore</button>
        <button onclick="deleteForever('${doc.id}')">Delete</button>
      </div>`;
    });
    document.getElementById("binNotes").innerHTML = html;
  });
}

function restoreNote(id){

db.collection("trash").doc(id).get().then(doc=>{

let note = doc.data();

db.collection("notes").add(note).then(()=>{
db.collection("trash").doc(id).delete();
});

});

}

function deleteForever(id){

if(!confirm("Delete permanently?")) return;

db.collection("trash").doc(id).delete()
.then(()=>{
console.log("Deleted permanently");
})
.catch(err=>{
console.error(err);
alert("Error deleting");
});

}

function closeBin(){
  document.getElementById("binModal").style.display="none";
}

function addEmoji(e){
document.getElementById("noteText").value += e;
}

let editingId = null;

function editNote(id,title,text){

db.collection("notes").doc(id).get().then(doc => {

const note = doc.data();

// allow only author OR owner
if(note.author === currentUser || currentUser.toLowerCase() === "manoj"){

editingId = id;

document.getElementById("editTitle").value = title;
document.getElementById("editText").value = text;

document.getElementById("editModal").style.display = "flex";

}else{
alert("Only " + note.author + " can edit this note ✏️");
}

});

}

function updateNote(){

let title = document.getElementById("editTitle").value;
let text = document.getElementById("editText").value;

db.collection("notes").doc(editingId).update({
title: title,
text: text
});

closeEdit();
}

function closeEdit(){
document.getElementById("editModal").style.display="none";
}

function updateAnniversary(){

// change this date
const startDate = new Date("2023-02-14");

const today = new Date();
const diffTime = today - startDate;
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

document.getElementById("anniversary").innerText =
"Together for " + days + " days 💖";

}
updateAnniversary();

async function exportPDF(){

const { jsPDF } = window.jspdf;

const snapshot = await db.collection("notes")
.orderBy("date","asc")
.get();

const container = document.createElement("div");
container.style.width = "700px";
container.style.padding = "20px";
container.style.fontFamily = "Poppins, sans-serif";
container.style.background = "#fff0f5";
container.style.color = "#333";

container.innerHTML = `<h1 style="text-align:center;color:#ff4d6d;">AWANOJ Love Diary 💖</h1>`;

snapshot.forEach(docSnap=>{
const n = docSnap.data();

const noteDiv = document.createElement("div");
noteDiv.style.marginBottom = "20px";
noteDiv.style.paddingBottom = "10px";
noteDiv.style.borderBottom = "1px solid #ddd";

noteDiv.innerHTML = `
<h3>${n.title || "Memory"}</h3>
<p><i>by ${n.author}</i></p>
<p style="white-space:pre-line">${n.text}</p>
<p style="font-size:12px;color:gray">
${new Date(n.date).toLocaleString()}
</p>
`;

container.appendChild(noteDiv);
});

document.body.appendChild(container);

const canvas = await html2canvas(container, { scale: 2 });
const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF("p","mm","a4");

const imgWidth = 190;
const pageHeight = 297;
const imgHeight = canvas.height * imgWidth / canvas.width;

let heightLeft = imgHeight;
let position = 0;

pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
heightLeft -= pageHeight;

while (heightLeft > 0){
position = heightLeft - imgHeight;
pdf.addPage();
pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
heightLeft -= pageHeight;
}

pdf.save("AWANOJ_Love_Diary.pdf");

document.body.removeChild(container);
}

async function exportSinglePDF(id){

const { jsPDF } = window.jspdf;

const snap = await db.collection("notes").doc(id).get();
const n = snap.data();

// styled container
const div = document.createElement("div");
div.style.padding = "30px";
div.style.width = "650px";
div.style.fontFamily = "Poppins, sans-serif";
div.style.background = "#fff0f5";
div.style.color = "#333";

div.innerHTML = `
<h2 style="color:#ff4d6d;text-align:center;">AWANOJ 💖</h2>
<h3>${n.title || "Memory"}</h3>
<p><i>by ${n.author}</i></p>
<p style="white-space:pre-line;">${n.text}</p>
<p style="font-size:12px;color:gray;">
${new Date(n.date).toLocaleString()}
</p>
`;

document.body.appendChild(div);

const canvas = await html2canvas(div, { scale: 2 });
const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF("p","mm","a4");

const imgWidth = 190;
const pageHeight = 297;
const imgHeight = canvas.height * imgWidth / canvas.width;

let heightLeft = imgHeight;
let position = 10;

pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
heightLeft -= pageHeight;

while (heightLeft > 0) {
position = heightLeft - imgHeight + 10;
pdf.addPage();
pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
heightLeft -= pageHeight;
}

pdf.save((n.title || "Love_Note") + ".pdf");

document.body.removeChild(div);
}

function getPassword(){
return localStorage.getItem("awanoj_pass");

function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "💖";

heart.style.left = Math.random()*100 + "vw";
heart.style.animationDuration = (3 + Math.random()*3) + "s";

document.querySelector(".hearts").appendChild(heart);

setTimeout(()=>{ heart.remove(); },6000);
}

function toggleMusic(){
  const music = document.getElementById("bgMusic");
  const btn = document.querySelector(".music-btn");

  if(music.paused){
    music.play();
    btn.innerText = "⏸️";
  } else {
    music.pause();
    btn.innerText = "▶️";
  }

let mediaRecorder;

async function startRecording(){
const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

mediaRecorder = new MediaRecorder(stream);

mediaRecorder.ondataavailable = e=>{
audioChunks.push(e.data);
};

audioChunks = [];

};

}

function loadDates(){

db.collection("dates")
.orderBy("date","asc")
.onSnapshot(snapshot=>{

  console.log("Current user:", currentUser);
let html="";

snapshot.forEach(doc=>{
let d = doc.data();

let today = new Date();
let eventDate = new Date(d.date);

let diff = Math.ceil((eventDate - today)/(1000*60*60*24));

let text="";
let className="";

if(diff > 0){
text = diff + " days left";
className="future";
}else if(diff === 0){
text = "Today ❤️";
className="today";
}else{
text = Math.abs(diff) + " days ago";
className="past";
}

html += `
<div class="date-card ${className}">
<div class="date-heart">💖</div>

<div class="date-content">
<b>${d.title}</b>
<p>${formatDate(d.date)}</p>

<div class="countdown">${text}</div>

${currentUser && currentUser.trim().toLowerCase() === "manoj" ?  
`<button class="delete-date" onclick="deleteDate('${doc.id}')">🗑</button>`
: ""}

</div>
</div>
`;
});

document.getElementById("datesList").innerHTML = html;

});
}

function formatDate(dateStr){

let d = new Date(dateStr);

let day = String(d.getDate()).padStart(2,'0');
let month = String(d.getMonth()+1).padStart(2,'0');
let year = d.getFullYear();

return `${day}-${month}-${year}`;
}
